version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - revive
  exclusions:
    paths:
      - vendor
      - testdata

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - vendor
      - testdata
